# NGINX CONFIGURATION
# This file tells the Nginx web server how to handle incoming traffic.

server {
    # Listen for standard HTTP traffic on port 80.
    listen 80;

    # Where Nginx should look for the files to serve.
    root /usr/share/nginx/html;
    
    # The default file to serve if the user goes to the root (/) path.
    index index.html;

    # HOW TO HANDLE ANGULAR ROUTING:
    # Angular is a Single Page Application (SPA). If a user refreshes the page at /dashboard,
    # the server will try to find a folder named 'dashboard' and fail (404 error).
    # This rule says: "Try to find the file ($uri). If it doesn't exist, try looking for a directory ($uri/). 
    # If THAT doesn't exist, just serve the main index.html file and let Angular handle the route internally."
    location / {
        try_files $uri $uri/ /index.html;
    }

    # HOW TO HANDLE API CALLS IN DOCKER COMPOSE:
    # If the frontend tries to call '/api/something', Nginx intercepts it.
    # It proxies (forwards) that request directly to the backend Spring Boot container.
    # 'backend' is the service name we will define in docker-compose.yml.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        # Tell the backend who originally made the request (useful for logging/security).
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_addrs;
    }
}