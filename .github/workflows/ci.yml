# GITHUB ACTIONS CI PIPELINE
# This file defines the automated tests that run every time someone pushes code to the repository.

name: LOS CI Pipeline

# Trigger this workflow when code is pushed to the 'main' branch or when a Pull Request targets 'main'.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Test and Build the Spring Boot Backend
  build-backend:
    # Run these steps on an Ubuntu Linux virtual machine.
    runs-on: ubuntu-latest
    
    steps:
    # Step 1.1: Download our code into the virtual machine.
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 1.2: Install Java 17.
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven # Cache dependencies to speed up future runs.

    # Step 1.3: Run the backend unit and integration tests. 
    # (If any test fails, this step fails, and the whole CI badge turns red!)
    - name: Run Backend Tests
      run: mvn test

    # Step 1.4: Verify the application actually compiles successfully.
    - name: Build Backend (Verify compilation)
      run: mvn clean package -DskipTests

  # JOB 2: Test and Build the Angular Frontend
  build-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2.1: Install Node.js v18.
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        # Tell the setup action where package-lock.json lives so it can cache properly.
        cache-dependency-path: frontend/package-lock.json

    # Step 2.2: Install the Angular dependencies.
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci

    # Step 2.3: Run the Angular unit tests.
    # Note: We use ChromeHeadless so it doesn't try to open a visible browser window on the Linux server.
    - name: Run Frontend Tests
      working-directory: ./frontend
      run: npm run test -- --watch=false --browsers=ChromeHeadless

    # Step 2.4: Verify the Angular application compiles for production successfully.
    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build --configuration=production
